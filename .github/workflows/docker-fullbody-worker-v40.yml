name: Build and Push Jumana FullBody Worker V40 World-Class Director

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image V40 World-Class Director
        run: |
          docker build --build-arg INSTALL_MUSEPOSE=true -t abdelazizaabi/jumana-fullbody-worker:v40-weights2 .

      - name: Push Docker image V40 World-Class Director
        run: |
          docker push abdelazizaabi/jumana-fullbody-worker:v40-weights2
